<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel Map</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <link rel="stylesheet" href="../style/map.css"/>
</head>
<body>

  <a href="../index.html" class="btn map-back" title="Back to homepage">← Home</a>

  <main>
    <!-- Map -->
    <div id="map" role="region" aria-label="Travel Map"></div>

    <!-- Map hint popup -->
    <div id="map-hint">
      <span id="map-hint-close" aria-label="Close hint">×</span>
      <div id="map-hint-content">
        <span class="map-hint-icon">💡</span>
        <p>Click locations to see photos</p>
      </div>
    </div>

    <!-- Sidebar -->
    <aside id="sidebar" aria-hidden="true">
      <div id="sidebar-controls">
        <button id="expand" aria-label="Expand sidebar">⤢</button>
        <button id="close" aria-label="Close sidebar">×</button>
      </div>
      <div id="content">
        <h2>Travel Map</h2>
        <p>Click a marker to see posts from that location.</p>
      </div>
    </aside>

    <!-- Lightbox -->
    <div id="lightbox" class="hidden" aria-hidden="true">
      <span id="lightbox-close" role="button" aria-label="Close image">&times;</span>
      <img id="lightbox-img" src="" alt="Expanded photo">
    </div>
  </main>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="../map.js"></script>

</body>
</html>
